<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#EDEAE3;color:#111;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid #C04A06;outline-offset:2px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
.hide-scroll::-webkit-scrollbar{display:none}
.hide-scroll{scrollbar-width:none}

/* ── Instant HTML splash — shows before any JS runs ──────────── */
#fl-splash{
  position:fixed;inset:0;z-index:99999;
  background:#F6F4EE;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#fl-splash .fl-logo{display:flex;align-items:center;gap:14px}
#fl-splash .fl-icon{
  width:58px;height:58px;border-radius:16px;
  background:linear-gradient(135deg,#C04A06,#E8732F);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 14px 32px rgba(192,74,6,.35);
  animation:flRise .55s cubic-bezier(.22,1,.36,1) both;
}
#fl-splash .fl-name{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:44px;color:#0E0D0B;letter-spacing:-.015em;line-height:1;
  animation:flRise .55s cubic-bezier(.22,1,.36,1) .07s both;
}
#fl-splash .fl-tag{
  font-family:'DM Serif Display',Georgia,serif;
  font-style:italic;font-size:15px;color:#C04A06;letter-spacing:.05em;
  animation:flRise .55s cubic-bezier(.22,1,.36,1) .16s both;
}
#fl-splash .fl-dots{display:flex;gap:7px;animation:flRise .4s ease .35s both}
#fl-splash .fl-dot{
  width:7px;height:7px;border-radius:50%;background:#C04A0644;
  animation:flPulse 1.1s ease-in-out infinite;
}
#fl-splash .fl-dot:nth-child(2){animation-delay:.18s}
#fl-splash .fl-dot:nth-child(3){animation-delay:.36s}
@keyframes flRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes flPulse{0%,100%{background:#C04A0633}50%{background:#C04A06AA}}
/* Fade-out triggered by JS setting data-fl-ready on <body> */
body[data-fl-ready] #fl-splash{
  animation:flOut .4s ease-out .05s forwards;
  pointer-events:none;
}
@keyframes flOut{to{opacity:0;visibility:hidden}}
</style>
</head>

    <div style={{ position:'fixed', inset:0, zIndex:9999, background:T.bg, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:18, animation:'splashFade .35s ease-out forwards', animationDelay:'1.4s' }}>
      <style>{`@keyframes splashFade{to{opacity:0;visibility:hidden}}@keyframes splashRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <div style={{ display:'flex', alignItems:'center', gap:12, animation:'splashRise .6s ease-out both' }}>
        <div style={{ width:54, height:54, borderRadius:14, background:T.brandGrad, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 14px 32px ${T.brand}40` }}>{Icon.brandmark({ width:30, height:30 })}</div>
        <div style={{ fontFamily:T.serif, fontSize:42, color:T.ink, letterSpacing:'-.01em' }}>Fluentra</div>
      </div>
      <div style={{ fontFamily:T.serif, fontStyle:'italic', fontSize:15, color:T.brand, letterSpacing:'.04em', animation:'splashRise .6s ease-out .15s both' }}>Speak it. Score it. Own it.</div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('dashboard');
  const [history, setHistory] = useState([]);
  const [device, setDevice] = useState('desktop'); // desktop | mobile
  const [splashGone, setSplashGone] = useState(false);
  const [langCode, setLangCode] = useState(window.__langCode || 'en');
  const [navTick, setNavTick] = useState(0); // bumps every nav so same-page re-mounts cleanly
  useEffect(() => { const t = setTimeout(() => setSplashGone(true), 2000); return () => clearTimeout(t); }, []);

  // Global navigation handle — any button anywhere can call window.__nav('exams') etc.
  // Also scrolls the canvas to top on nav.
  useEffect(() => {
    window.__nav = (id, opts = {}) => {
      if (!id) return;
      setHistory(h => [...h, page]);
      if (opts.langCode) { window.__langCode = opts.langCode; setLangCode(opts.langCode); }
      if (window.__langCode && id === 'lang') setLangCode(window.__langCode);
      setPage(id);
      setNavTick(t => t + 1);
      requestAnimationFrame(() => {
        document.querySelectorAll('[data-app-scroll]').forEach(el => { el.scrollTop = 0; });
      });
    };
    window.__back = () => {
      setHistory(h => {
        if (h.length === 0) return h;
        const prev = h[h.length - 1];
        setPage(prev);
        return h.slice(0, -1);
      });
    };
    return () => { delete window.__nav; delete window.__back; };
  }, [page]);

  // Safety-net delegate: any <button data-nav="page"> inside the frame navigates.
  // Also: any <a data-nav="page">. Lets pages declare destinations without prop drilling.
  useEffect(() => {
    const handler = (e) => {
      const el = e.target.closest('[data-nav]');
      if (!el) return;
      const target = el.getAttribute('data-nav');
      if (!target) return;
      const langCode = el.getAttribute('data-lang');
      if (langCode) window.__langCode = langCode;
      const profileId = el.getAttribute('data-profile');
      if (profileId) window.__profileId = profileId;
      e.preventDefault();
      window.__nav(target);
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);
  const [vp, setVp] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const r = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', r); return () => window.removeEventListener('resize', r);
  }, []);

  const isMobile = device === 'mobile';
  const W = isMobile ? 390 : vp.w;       // desktop now fills the browser width
  const H = isMobile ? 844 : vp.h;       // and the full viewport height
  const margin = 48 + 100;
  const scale = isMobile ? Math.min(1, (vp.w - 80) / 390, (vp.h - margin) / 844) : 1;

  const renderFrame = () => {
    if (isMobile) {
      return (
        <MobileFrame>
          {MOBILE_PAGES[page]()}
        </MobileFrame>
      );
    }
    const fullBleed = page === 'marketing' || page === 'auth_login' || page === 'auth_signup' || page === 'auth_onboarding' || page === 'otp' || page === 'forgot_pw' || page.startsWith('new_');
    return (
      <div style={{ width:W, height:H, background:'#F9F8F5', overflow:'hidden', display:'flex' }}>
        {!fullBleed && <WebSidebar active={page === 'lang' ? 'home' : page} activeLang={page === 'lang' ? langCode : null} onNav={(id) => window.__nav(id)}/>}
        <div key={page + '-' + langCode + '-' + navTick} style={{ flex:1, display:'flex', minWidth:0 }}>{WEB_PAGES[page]()}</div>
      </div>
    );
  };

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', background: isMobile ? '#EDEAE3' : '#F9F8F5', padding: isMobile ? '40px 40px 40px' : '0', overflow:'auto' }}>
      {!splashGone && <Splash/>}
      <div style={{ width:W*scale, height:H*scale, flexShrink:0 }}>
        <div style={{ width:W, height:H, transform:`scale(${scale})`, transformOrigin:'top left' }}>
          {renderFrame()}
        </div>
      </div>

      {/* Toolbar removed for production deploy. To re-enable for preview, re-add the toolbar + what's-new strip blocks. */}
    </div>
  );
}

let __mounted = false;
const __mount = () => {
  if (__mounted) return;
  if (!window.App || !window.DashboardPage || !window.MDashboard) return;
  __mounted = true;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  // Dismiss HTML splash once React is in the DOM
  // (backend.js also sets this after session check, whichever is later)
  setTimeout(() => document.body.setAttribute('data-fl-ready', '1'), 800);
};
const __tick = () => { __mount(); if (!__mounted) setTimeout(__tick, 50); };
__tick();
setTimeout(__mount, 1500);
setTimeout(__mount, 3000);
</script>
</body>
</html>
