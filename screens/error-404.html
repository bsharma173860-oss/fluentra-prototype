<!doctype html><html><head><meta charset="utf-8"><title>404 · Fluentra</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
  .num{font-family:var(--serif-display);font-size:160px;line-height:.9;color:var(--brand);margin-bottom:6px;letter-spacing:-0.02em}
  .num em{font-style:italic;color:var(--ink5)}
  .eyebrow{font-size:11px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
  h1{font-family:var(--serif-display);font-size:32px;line-height:1.1;margin:0 0 12px;max-width:480px}
  p{font-size:14px;color:var(--ink3);max-width:420px;margin:0 0 26px;line-height:1.55}
  .btns{display:flex;gap:10px;margin-bottom:36px}
  .btn{font-family:inherit;font-size:13px;font-weight:700;border-radius:99px;padding:11px 20px;border:0;cursor:pointer}
  .pri{background:var(--brand);color:#fff}
  .out{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .links{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:520px}
  .links a{font-size:11px;font-weight:600;background:#fff;border:1px solid var(--border);padding:6px 14px;border-radius:99px;color:var(--ink2);text-decoration:none}
  .meta{margin-top:30px;font-size:11px;color:var(--ink4);font-family:ui-monospace,monospace}
</style></head><body>
<div class="num">4<em>0</em>4</div>
<div class="eyebrow">Page not found</div>
<h1>Lost in translation.</h1>
<p>We couldn't find that page. It may have been moved, renamed, or it never existed in the first place.</p>
<div class="btns"><button class="btn pri">← Back to dashboard</button><button class="btn out">Search the catalog</button></div>
<div class="links">
  <a>Today's lesson</a><a>Speaking practice</a><a>My vocab</a><a>Tutor</a><a>Help center</a>
</div>
<div class="meta">/lessons/spanish/b1/lesson-99-not-here</div>
</body></html>
